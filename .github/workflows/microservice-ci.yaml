name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}

    steps:
      # -------------------
      # Checkout source
      # -------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------
      # Setup Docker Buildx
      # -------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------
      # Login to GHCR
      # -------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------
      # Set Build Context Dynamically
      # -------------------
      - name: Set build context
        run: |
          if [ "${{ inputs.service }}" = "cartservice" ]; then
            echo "BUILD_CONTEXT=./src/cartservice/src" >> $GITHUB_ENV
            echo "DOCKERFILE=./src/cartservice/src/Dockerfile" >> $GITHUB_ENV
          else
            echo "BUILD_CONTEXT=./src/${{ inputs.service }}" >> $GITHUB_ENV
            echo "DOCKERFILE=./src/${{ inputs.service }}/Dockerfile" >> $GITHUB_ENV
          fi

      # -------------------
      # Build Docker image (with cache)
      # -------------------
      - name: Build Image
        run: |
          docker build \
            -f $DOCKERFILE \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t $IMAGE_NAME \
            $BUILD_CONTEXT

      # -------------------
      # Security Scan (Trivy)
      # -------------------
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          exit-code: 0
          vuln-type: os,library

      # -------------------
      # Push image to GHCR
      # -------------------
      - name: Push Image
        run: docker push $IMAGE_NAME